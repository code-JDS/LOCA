test_configs:
  # Gemini

  - name: "gemini-2.5-pro-42"
    input_path: "problem_set/CPhO/test_42.jsonl"
    output_path: "test_results/CPhO/LOCA/gemini-2.5-pro/results_42.jsonl"
    scheme: "loca"
    temperature: 0.0
    models:
      generator: "gemini/gemini-2.5-pro"
      reviewer: "gemini/gemini-2.5-pro"
    loca_options:
      refine_model: "gemini/gemini-2.5-pro"
      max_error_times: 5
      target_times: 3
      n_interpretation: 4
      stepwise_review: True  # Enable stepwise review process

